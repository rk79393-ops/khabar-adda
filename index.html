<style>
  :root{
    --ink:#15213B;
    --ink-2:#28344F;
    --paper:#F2F2EE;
    --card:#FFFFFF;
    --saffron:#EF9F2D;
    --alert:#D7263D;
    --teal:#1C7C6B;
    --line:#DCDAD3;
    --muted:#6B7280;
    --font-display:'Yatra One', serif;
    --font-body:'Hind', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --radius:14px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; }
  img{ max-width:100%; display:block; }

  .sr-only{
    position:absolute; width:1px; height:1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap;
  }

  a:focus-visible, button:focus-visible, input:focus-visible{
    outline:3px solid var(--saffron); outline-offset:2px; border-radius:4px;
  }

  /* ---------- Utility bar ---------- */
  .utility-bar{
    background:var(--ink);
    color:#E7E9EF;
    font-size:.8rem;
    padding:.5rem 1.25rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
  }
  .utility-bar .date{ font-weight:500; }
  .utility-bar .clock{ font-family:var(--font-mono); color:#C9CEDB; letter-spacing:.03em; }
  .live-indicator{ display:flex; align-items:center; font-weight:600; color:#FFD9DF; }
  .dot{
    width:8px; height:8px; border-radius:50%; background:var(--alert);
    display:inline-block; margin-right:6px;
    animation:pulse-dot 1.6s infinite;
  }
  @keyframes pulse-dot{
    0%,100%{ box-shadow:0 0 0 0 rgba(215,38,61,.65); }
    50%{ box-shadow:0 0 0 6px rgba(215,38,61,0); }
  }

  /* ---------- Masthead ---------- */
  .masthead{
    text-align:center;
    padding:2.25rem 1rem 1.25rem;
  }
  .logo{
    font-family:var(--font-display);
    font-size:clamp(2.4rem, 6vw, 4rem);
    margin:0;
    color:var(--ink);
    letter-spacing:.01em;
  }
  .logo span{ color:var(--alert); }
  .tagline{
    margin:.4rem 0 0;
    color:var(--muted);
    font-size:1rem;
    font-weight:400;
  }

  /* ---------- Ticker ---------- */
  .ticker-wrap{
    display:flex;
    align-items:center;
    background:var(--alert);
    color:#fff;
    overflow:hidden;
  }
  .ticker-badge{
    flex:0 0 auto;
    background:#A2152A;
    font-weight:700;
    font-size:.8rem;
    padding:.55rem .9rem;
    letter-spacing:.04em;
    white-space:nowrap;
  }
  .ticker-viewport{
    flex:1 1 auto;
    overflow:hidden;
    position:relative;
  }
  .ticker-track{
    display:flex;
    width:max-content;
    animation:ticker-scroll 40s linear infinite;
  }
  .ticker-track:hover{ animation-play-state:paused; }
  .ticker-content{
    white-space:nowrap;
    padding:.55rem 0;
    font-weight:500;
    font-size:.92rem;
  }
  .ticker-content + .ticker-content{ padding-left:3rem; }
  @keyframes ticker-scroll{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }

  /* ---------- Controls ---------- */
  .controls{
    max-width:1180px;
    margin:0 auto;
    padding:1.1rem 1.25rem .5rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
    border-bottom:1px solid var(--line);
  }
  .tabs{
    display:flex;
    gap:.25rem;
    overflow-x:auto;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    background:none;
    border:none;
    border-bottom:3px solid transparent;
    padding:.5rem .85rem;
    font-weight:600;
    font-size:.92rem;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    transition:color .15s ease;
  }
  .tab:hover{ color:var(--alert); }
  .tab--active{ border-bottom-color:var(--tab-color, var(--saffron)); color:var(--ink); }

  .search-refresh{ display:flex; gap:.5rem; align-items:center; }
  #searchInput{
    border:1px solid var(--line);
    background:var(--card);
    border-radius:999px;
    padding:.5rem 1rem;
    font-size:.9rem;
    font-family:var(--font-body);
    width:200px;
    color:var(--ink);
  }
  #refreshBtn{
    border:1px solid var(--line);
    background:var(--card);
    border-radius:50%;
    width:38px; height:38px;
    font-size:1.1rem;
    line-height:1;
    cursor:pointer;
    color:var(--ink);
  }
  #refreshBtn:disabled{ opacity:.6; cursor:default; }
  .spin{ display:inline-block; animation:spin .9s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Main ---------- */
  main{
    max-width:1180px;
    margin:0 auto;
    padding:1.25rem 1.25rem 3rem;
  }
  .status-line{
    font-size:.82rem;
    color:var(--muted);
    margin:0 0 1rem;
    min-height:1.1em;
  }

  #featuredWrap{ margin-bottom:1.5rem; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
    gap:1.4rem;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(21,33,59,.08);
  }
  .card__media{
    position:relative;
    aspect-ratio:16/9;
    background:#EDEBE4;
    overflow:hidden;
  }
  .card__media img{ width:100%; height:100%; object-fit:cover; }
  .fallback-media{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .fallback-letter{
    font-family:var(--font-display);
    font-size:2.6rem;
    color:rgba(255,255,255,.92);
  }
  .card__source{
    position:absolute; top:.6rem; left:.6rem;
    color:#fff;
    font-size:.72rem;
    font-weight:700;
    padding:.25rem .55rem;
    border-radius:999px;
    letter-spacing:.02em;
  }
  .card__body{
    padding:1rem 1.1rem 1.2rem;
    display:flex;
    flex-direction:column;
    gap:.4rem;
    flex:1;
  }
  .card__time{
    font-size:.76rem;
    color:var(--muted);
    font-weight:500;
  }
  .card__title{
    margin:0;
    font-size:1.05rem;
    font-weight:600;
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card__title a:hover{ color:var(--alert); }
  .card__desc{
    margin:0;
    font-size:.88rem;
    color:var(--muted);
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card__readmore{
    margin-top:auto;
    font-size:.84rem;
    font-weight:700;
    color:var(--teal);
  }
  .card__readmore:hover{ color:var(--alert); }

  /* Featured card */
  .card--featured{
    flex-direction:row;
  }
  .card--featured .card__media{ flex:1 1 50%; aspect-ratio:auto; }
  .card--featured .card__body{ flex:1 1 50%; padding:1.5rem 1.6rem; justify-content:center; }
  .card--featured .card__title{ font-size:1.5rem; -webkit-line-clamp:4; }
  .card--featured .fallback-letter{ font-size:4rem; }
  @media (max-width:720px){
    .card--featured{ flex-direction:column; }
    .card--featured .card__media{ aspect-ratio:16/9; }
  }

  /* Skeletons */
  .skeleton{
    background:linear-gradient(90deg,#E6E4DD 25%,#F1EFE8 37%,#E6E4DD 63%);
    background-size:400px 100%;
    animation:shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%{ background-position:-400px 0; }
    100%{ background-position:400px 0; }
  }
  .skeleton-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .skeleton-card .sk-media{ aspect-ratio:16/9; }
  .skeleton-card .sk-line{ height:.9rem; margin:1rem 1.1rem 0; border-radius:6px; }
  .skeleton-card .sk-line.short{ width:60%; margin-bottom:1.1rem; }

  /* Empty state */
  .empty-state{
    text-align:center;
    padding:3rem 1rem;
    color:var(--muted);
  }
  .empty-state h3{ color:var(--ink); margin-bottom:.4rem; }
  .empty-state button{
    margin-top:1rem;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:.6rem 1.4rem;
    font-weight:600;
    cursor:pointer;
  }

  footer{
    background:var(--ink);
    color:#B9C0D1;
    font-size:.82rem;
    padding:1.5rem 1.25rem;
    text-align:center;
  }
  footer p{ margin:.25rem 0; }
  footer .mono{ font-family:var(--font-mono); color:#E7E9EF; }

  @media (prefers-reduced-motion: reduce){
    .ticker-track{ animation:none !important; }
    .ticker-viewport{ overflow-x:auto; }
    .spin{ animation:none !important; }
    .dot{ animation:none !important; }
    .card{ transition:none !important; }
  }
</style>
</head>
<body>

  <div class="utility-bar">
    <span class="date" id="todayDate"></span>
    <span class="clock" id="liveClock"></span>
    <span class="live-indicator"><span class="dot"></span>लाइव</span>
  </div>

  <header class="masthead">
    <h1 class="logo">ख़बर <span>अड्डा</span></h1>
    <p class="tagline">देश-दुनिया की हर ख़बर, एक जगह — असली समय में</p>
  </header>

  <div class="ticker-wrap" aria-hidden="true">
    <span class="ticker-badge">ब्रेकिंग</span>
    <div class="ticker-viewport">
      <div class="ticker-track" id="tickerTrack">
        <div class="ticker-content" id="tickerContent"></div>
        <div class="ticker-content" id="tickerContentDup"></div>
      </div>
    </div>
  </div>

  <nav class="controls">
    <div class="tabs" id="tabs"></div>
    <div class="search-refresh">
      <input type="text" id="searchInput" placeholder="ख़बर खोजें…" aria-label="ख़बर खोजें">
      <button id="refreshBtn" title="अपडेट करें" aria-label="अपडेट करें">⟳</button>
    </div>
  </nav>

  <main>
    <h2 class="sr-only">नवीनतम समाचार</h2>
    <p class="status-line" id="statusLine"></p>
    <section id="featuredWrap"></section>
    <section class="grid" id="grid"></section>
  </main>

  <footer>
    <p>स्रोत: आज तक · NDTV इंडिया · BBC हिंदी · अमर उजाला · नवभारत टाइम्स — सार्वजनिक RSS फ़ीड से लाइव डेटा</p>
    <p id="lastUpdated" class="mono"></p>
  </footer>

<script>
(function(){
  "use strict";

  var SOURCES = [
    { id:'aajtak',    name:'आज तक',         url:'https://www.aajtak.in/rssfeeds/?id=home',                  color:'#E15252' },
    { id:'ndtv',      name:'NDTV इंडिया',   url:'https://feeds.feedburner.com/ndtvkhabar-latest',          color:'#1F5FBF' },
    { id:'bbc',       name:'BBC हिंदी',      url:'https://feeds.bbci.co.uk/hindi/rss.xml',                   color:'#16181B' },
    { id:'amarujala', name:'अमर उजाला',     url:'https://www.amarujala.com/rss/breaking-news.xml',          color:'#1C7C6B' },
    { id:'nbt',       name:'नवभारत टाइम्स', url:'https://navbharattimes.indiatimes.com/rssfeedsdefault.cms', color:'#9C4221' }
  ];

  var state = {
    allItems: [],
    activeSource: 'all',
    query: '',
    isLoading: false
  };

  var tabsEl = document.getElementById('tabs');
  var searchInput = document.getElementById('searchInput');
  var refreshBtn = document.getElementById('refreshBtn');
  var statusLine = document.getElementById('statusLine');
  var featuredWrap = document.getElementById('featuredWrap');
  var grid = document.getElementById('grid');
  var tickerTrack = document.getElementById('tickerTrack');
  var tickerContent = document.getElementById('tickerContent');
  var tickerContentDup = document.getElementById('tickerContentDup');
  var lastUpdatedEl = document.getElementById('lastUpdated');

  function el(tag, className){
    var e = document.createElement(tag);
    if(className) e.className = className;
    return e;
  }

  function stripHtml(html){
    if(!html) return '';
    var div = document.createElement('div');
    div.innerHTML = html;
    return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
  }

  function extractImg(html){
    if(!html) return null;
    var m = /<img[^>]+src=["']([^"'>]+)["']/i.exec(html);
    return m ? m[1] : null;
  }

  function truncate(text, n){
    if(!text) return '';
    return text.length > n ? text.slice(0, n).trim() + '…' : text;
  }

  function timeAgo(date){
    if(!date || isNaN(date.getTime())) return '';
    var diffSec = Math.floor((Date.now() - date.getTime()) / 1000);
    if(diffSec < 0) diffSec = 0;
    if(diffSec < 60) return 'अभी-अभी';
    var diffMin = Math.floor(diffSec / 60);
    if(diffMin < 60) return diffMin + ' मिनट पहले';
    var diffHr = Math.floor(diffMin / 60);
    if(diffHr < 24) return diffHr + ' घंटे पहले';
    var diffDay = Math.floor(diffHr / 24);
    if(diffDay < 7) return diffDay + ' दिन पहले';
    return date.toLocaleDateString('hi-IN-u-nu-latn', { day:'numeric', month:'short' });
  }

  /* ---------- Fetching ---------- */

  function normalizeRss2Json(item, source){
    var img = item.thumbnail || (item.enclosure && item.enclosure.link) || extractImg(item.description) || null;
    return {
      title: stripHtml(item.title || ''),
      link: item.link || '#',
      description: truncate(stripHtml(item.description || item.content || ''), 150),
      pubDate: new Date(item.pubDate),
      image: img,
      sourceId: source.id,
      sourceName: source.name,
      sourceColor: source.color
    };
  }

  function normalizeXmlNode(node, source){
    function text(sel){
      var n = node.querySelector(sel);
      return n ? n.textContent : '';
    }
    var enclosure = node.querySelector('enclosure');
    var mediaContent = node.getElementsByTagName('media:content')[0];
    var img = (enclosure && enclosure.getAttribute('url')) ||
              (mediaContent && mediaContent.getAttribute('url')) ||
              extractImg(text('description')) || null;
    return {
      title: stripHtml(text('title')),
      link: text('link'),
      description: truncate(stripHtml(text('description')), 150),
      pubDate: new Date(text('pubDate')),
      image: img,
      sourceId: source.id,
      sourceName: source.name,
      sourceColor: source.color
    };
  }

  function fetchViaRss2Json(source){
    var api = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(source.url);
    return fetch(api).then(function(res){
      if(!res.ok) throw new Error('rss2json bad response');
      return res.json();
    }).then(function(data){
      if(data.status !== 'ok' || !data.items || !data.items.length) throw new Error('rss2json empty');
      return data.items.map(function(it){ return normalizeRss2Json(it, source); });
    });
  }

  function fetchViaProxy(proxyUrl, source){
    return fetch(proxyUrl).then(function(res){
      if(!res.ok) throw new Error('proxy bad response');
      return res.text();
    }).then(function(text){
      var xml = new DOMParser().parseFromString(text, 'text/xml');
      var items = Array.prototype.slice.call(xml.querySelectorAll('item'));
      if(!items.length) throw new Error('proxy empty xml');
      return items.map(function(node){ return normalizeXmlNode(node, source); });
    });
  }

  function fetchSource(source){
    return fetchViaRss2Json(source).catch(function(){
      var allOrigins = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(source.url);
      return fetchViaProxy(allOrigins, source).catch(function(){
        var corsProxy = 'https://corsproxy.io/?url=' + encodeURIComponent(source.url);
        return fetchViaProxy(corsProxy, source).catch(function(){
          return [];
        });
      });
    });
  }

  /* ---------- Rendering ---------- */

  function buildFallback(item){
    var fb = el('div', 'fallback-media');
    fb.style.background = 'linear-gradient(135deg, ' + item.sourceColor + ', var(--ink))';
    var letter = el('span', 'fallback-letter');
    letter.textContent = item.sourceName.charAt(0);
    fb.appendChild(letter);
    return fb;
  }

  function buildCard(item, featured){
    var card = el('article', featured ? 'card card--featured' : 'card');
    var media = el('div', 'card__media');

    if(item.image){
      var img = document.createElement('img');
      img.src = item.image;
      img.alt = item.title;
      img.loading = 'lazy';
      img.onerror = function(){
        media.innerHTML = '';
        media.appendChild(buildFallback(item));
      };
      media.appendChild(img);
    } else {
      media.appendChild(buildFallback(item));
    }

    var badge = el('span', 'card__source');
    badge.textContent = item.sourceName;
    badge.style.background = item.sourceColor;
    media.appendChild(badge);
    card.appendChild(media);

    var body = el('div', 'card__body');

    var time = el('span', 'card__time');
    time.textContent = timeAgo(item.pubDate);
    body.appendChild(time);

    var titleTag = featured ? 'h2' : 'h3';
    var title = el(titleTag, 'card__title');
    var titleLink = document.createElement('a');
    titleLink.href = item.link;
    titleLink.target = '_blank';
    titleLink.rel = 'noopener noreferrer';
    titleLink.textContent = item.title;
    title.appendChild(titleLink);
    body.appendChild(title);

    if(item.description){
      var desc = el('p', 'card__desc');
      desc.textContent = item.description;
      body.appendChild(desc);
    }

    var readMore = document.createElement('a');
    readMore.href = item.link;
    readMore.target = '_blank';
    readMore.rel = 'noopener noreferrer';
    readMore.className = 'card__readmore';
    readMore.textContent = 'मूल लेख पढ़ें →';
    body.appendChild(readMore);

    card.appendChild(body);
    return card;
  }

  function skeletonCard(){
    var card = el('div', 'skeleton-card');
    var media = el('div', 'sk-media skeleton');
    card.appendChild(media);
    card.appendChild(el('div', 'sk-line skeleton'));
    card.appendChild(el('div', 'sk-line short skeleton'));
    return card;
  }

  function renderSkeleton(){
    featuredWrap.innerHTML = '';
    grid.innerHTML = '';
    var bigSkeleton = el('div', 'skeleton-card');
    var bigMedia = el('div', 'sk-media skeleton');
    bigMedia.style.aspectRatio = '21/8';
    bigSkeleton.appendChild(bigMedia);
    bigSkeleton.appendChild(el('div', 'sk-line skeleton'));
    bigSkeleton.appendChild(el('div', 'sk-line short skeleton'));
    featuredWrap.appendChild(bigSkeleton);
    for(var i=0;i<6;i++){ grid.appendChild(skeletonCard()); }
  }

  function applyFilters(){
    var list = state.activeSource === 'all'
      ? state.allItems
      : state.allItems.filter(function(i){ return i.sourceId === state.activeSource; });
    var q = state.query.trim().toLowerCase();
    if(q){
      list = list.filter(function(i){ return i.title.toLowerCase().indexOf(q) !== -1; });
    }
    return list;
  }

  function showEmpty(){
    featuredWrap.innerHTML = '';
    grid.innerHTML = '';
    var wrap = el('div', 'empty-state');
    var h3 = el('h3');
    var p = el('p');
    if(state.allItems.length === 0){
      h3.textContent = 'अभी कोई ख़बर लोड नहीं हो सकी';
      p.textContent = 'नेटवर्क या स्रोत में दिक़्क़त हो सकती है। दोबारा कोशिश करें।';
    } else {
      h3.textContent = 'इस खोज से कोई ख़बर नहीं मिली';
      p.textContent = 'कोई और शब्द आज़माएँ या स्रोत बदलें।';
    }
    wrap.appendChild(h3);
    wrap.appendChild(p);
    var btn = document.createElement('button');
    btn.textContent = 'फिर से कोशिश करें';
    btn.addEventListener('click', function(){ loadAll(true); });
    wrap.appendChild(btn);
    grid.appendChild(wrap);
  }

  function render(){
    var list = applyFilters();
    featuredWrap.innerHTML = '';
    grid.innerHTML = '';
    if(!list.length){ showEmpty(); return; }
    var first = list[0];
    featuredWrap.appendChild(buildCard(first, true));
    for(var i=1;i<list.length;i++){
      grid.appendChild(buildCard(list[i], false));
    }
  }

  function buildTabs(){
    tabsEl.innerHTML = '';
    tabsEl.appendChild(makeTab('सभी', 'all', null));
    SOURCES.forEach(function(s){
      tabsEl.appendChild(makeTab(s.name, s.id, s.color));
    });
  }

  function makeTab(label, id, color){
    var btn = document.createElement('button');
    btn.className = 'tab' + (state.activeSource === id ? ' tab--active' : '');
    btn.textContent = label;
    btn.dataset.id = id;
    if(color) btn.style.setProperty('--tab-color', color);
    btn.addEventListener('click', function(){
      state.activeSource = id;
      Array.prototype.forEach.call(tabsEl.querySelectorAll('.tab'), function(b){
        b.classList.toggle('tab--active', b.dataset.id === id);
      });
      render();
    });
    return btn;
  }

  function buildTicker(){
    var items = state.allItems.slice(0, 12);
    var text = items.map(function(i){ return i.title; }).join('   •   ');
    tickerContent.textContent = text;
    tickerContentDup.textContent = text;
    requestAnimationFrame(function(){
      var totalWidth = tickerTrack.scrollWidth / 2;
      var speed = 65; // px per second
      var duration = Math.max(totalWidth / speed, 15);
      tickerTrack.style.animationDuration = duration + 's';
    });
  }

  function updateStatusLine(succeeded, total){
    if(succeeded === total){
      statusLine.textContent = '';
    } else if(succeeded > 0){
      statusLine.textContent = total + ' में से ' + succeeded + ' स्रोत से ख़बरें मिलीं — बाकी पर दोबारा कोशिश जारी है।';
    } else {
      statusLine.textContent = '';
    }
  }

  function updateLastUpdatedFooter(){
    var now = new Date();
    lastUpdatedEl.textContent = 'आख़िरी अपडेट: ' + now.toLocaleTimeString('hi-IN-u-nu-latn', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function setRefreshLoading(loading){
    refreshBtn.disabled = loading;
    refreshBtn.innerHTML = loading ? '<span class="spin">⟳</span>' : '⟳';
  }

  function loadAll(showSkeleton){
    if(state.isLoading) return;
    state.isLoading = true;
    setRefreshLoading(true);
    if(showSkeleton) renderSkeleton();

    Promise.all(SOURCES.map(function(s){
      return fetchSource(s).catch(function(){ return []; });
    })).then(function(results){
      var combined = [];
      var succeeded = 0;
      results.forEach(function(list){
        if(list && list.length){
          combined = combined.concat(list);
          succeeded++;
        }
      });
      combined.sort(function(a,b){
        var ta = a.pubDate && !isNaN(a.pubDate.getTime()) ? a.pubDate.getTime() : 0;
        var tb = b.pubDate && !isNaN(b.pubDate.getTime()) ? b.pubDate.getTime() : 0;
        return tb - ta;
      });
      state.allItems = combined;
      updateStatusLine(succeeded, SOURCES.length);
      buildTicker();
      render();
      updateLastUpdatedFooter();
    }).finally(function(){
      state.isLoading = false;
      setRefreshLoading(false);
    });
  }

  function debounce(fn, delay){
    var t;
    return function(){
      var args = arguments;
      clearTimeout(t);
      t = setTimeout(function(){ fn.apply(null, args); }, delay);
    };
  }

  function startClock(){
    var dateEl = document.getElementById('todayDate');
    var clockEl = document.getElementById('liveClock');
    function tick(){
      var now = new Date();
      dateEl.textContent = now.toLocaleDateString('hi-IN-u-nu-latn', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      clockEl.textContent = now.toLocaleTimeString('hi-IN-u-nu-latn', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }
    tick();
    setInterval(tick, 1000);
  }

  /* ---------- Init ---------- */
  startClock();
  buildTabs();
  loadAll(true);
  setInterval(function(){ loadAll(false); }, 5 * 60 * 1000);

  searchInput.addEventListener('input', debounce(function(e){
    state.query = e.target.value;
    render();
  }, 200));

  refreshBtn.addEventListener('click', function(){ loadAll(true); });

})();
</script>
</body>
</html>
